name: Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64, ARM64]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild "Intelligent Search Scope Expander.sln" /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /m

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: IntelligentSearchScopeExpander-${{ matrix.platform }}-${{ matrix.configuration }}
        path: ${{ matrix.platform }}/${{ matrix.configuration }}/*.exe
